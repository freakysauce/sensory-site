<style>
/* v4 "THE PANEL": pure CSS, no JS on an error page */
@font-face { font-family:'Tanker'; src:url('assets/fonts/Tanker-400.woff2') format('woff2'); font-weight:400; font-display:swap; }
@font-face { font-family:'Khand'; src:url('assets/fonts/Khand-600.woff2') format('woff2'); font-weight:600; font-display:swap; }
@font-face { font-family:'PlexMono'; src:url('assets/fonts/PlexMono-400.woff2') format('woff2'); font-weight:400; font-display:swap; }
@font-face { font-family:'Supreme'; src:url('assets/fonts/Supreme-Regular.woff2') format('woff2'); font-weight:400; font-display:swap; }
html,body { margin:0; min-height:100svh; background:#b6b3a8; color:#32302a;
  font:400 16px/1.65 'Supreme',-apple-system,sans-serif; display:grid; place-items:center;
  background-image:repeating-linear-gradient(90deg, rgba(255,255,255,.022) 0 1px, transparent 1px 3px); }
.plate { position:relative; text-align:center; padding:44px 40px 40px; max-width:560px; margin:20px;
  background:linear-gradient(180deg,#d7d4ca,#c8c5ba 9%,#c8c5ba 91%,#b6b3a8); border-radius:7px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.55), inset 0 -1px 0 rgba(0,0,0,.16), 0 4px 14px rgba(0,0,0,.25); }
.screw { position:absolute; width:11px; height:11px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#e9e6dd,#8e8b82 60%,#67645c);
  box-shadow:inset 0 -1px 2px rgba(0,0,0,.4),0 1px 1px rgba(255,255,255,.4); }
.screw::after { content:''; position:absolute; left:1.5px; right:1.5px; top:50%; height:1.5px;
  background:rgba(40,38,32,.65); transform:rotate(33deg); border-radius:1px; }
.screw.tl{top:8px;left:8px}.screw.tr{top:8px;right:8px}
.screw.bl{bottom:8px;left:8px}.screw.br{bottom:8px;right:8px}
.screw.tr::after{transform:rotate(-24deg)}.screw.bl::after{transform:rotate(78deg)}.screw.br::after{transform:rotate(-58deg)}
.strip { display:flex; gap:8px; justify-content:center; margin-bottom:28px; }
.win { border-radius:4px; min-width:104px; min-height:56px; padding:8px 10px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
  background:linear-gradient(180deg,#3f3d36,#454339 30%,#403e37);
  box-shadow:inset 0 2px 5px rgba(0,0,0,.55), inset 0 0 0 1px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.35); }
.win .l1 { font:600 12.5px/1.15 'Khand',sans-serif; letter-spacing:.1em; color:#8b887c; text-transform:uppercase; }
.win .l2 { font:400 9.5px/1.2 'PlexMono',monospace; letter-spacing:.07em; color:#767368; text-transform:uppercase; }
.win.on { background:radial-gradient(ellipse at 50% 42%,#ffd894 0%,#f0a43c 55%,#c97e18 100%);
  box-shadow:inset 0 1px 3px rgba(255,255,255,.5), inset 0 -2px 5px rgba(120,60,0,.4),
    0 0 18px rgba(240,164,60,.5), 0 1px 0 rgba(255,255,255,.3);
  animation:blink 2.6s ease-in-out infinite; }
.win.on .l1 { color:#3a2503; } .win.on .l2 { color:#6b4a10; }
@keyframes blink { 0%,100%{filter:brightness(1)} 50%{filter:brightness(.74)} }
@media (prefers-reduced-motion:reduce){ .win.on{animation:none} }
h1 { font:400 clamp(30px,6vw,44px)/1.02 'Tanker',sans-serif; text-transform:uppercase;
  letter-spacing:.01em; margin:0 0 12px; text-shadow:0 1px 0 rgba(255,255,255,.48); }
p { color:#565349; margin:0 0 28px; }
a.btn { display:inline-block; background:linear-gradient(180deg,#43a05b,#2a7440); color:#f0f8f1;
  text-decoration:none; font:600 15px/1.2 'Khand',sans-serif; letter-spacing:.12em; text-transform:uppercase;
  padding:15px 24px 13px; border-radius:6px; text-shadow:0 1px 1px rgba(0,0,0,.35);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.35), inset 0 -3px 4px rgba(0,0,0,.26), 0 2px 5px rgba(0,0,0,.28); }
a.plain { color:#565349; display:inline-block; margin-top:16px; font-size:14px; }
</style>

<body>
<div class="plate">
  <span class="screw tl" aria-hidden="true"></span><span class="screw tr" aria-hidden="true"></span>
  <span class="screw bl" aria-hidden="true"></span><span class="screw br" aria-hidden="true"></span>
  <div class="strip" aria-hidden="true">
    <div class="win"><span class="l1">Route</span><span class="l2">not found</span></div>
    <div class="win on"><span class="l1">404</span><span class="l2">no signal</span></div>
    <div class="win"><span class="l1">Baseline</span><span class="l2">healthy</span></div>
  </div>
  <h1>This page isn't in the healthy baseline.</h1>
  <p>The address may have drifted, or it never existed. Everything that matters is one page anyway.</p>
  <a class="btn" href="/">Back to sentys.ai</a><br>
  <a class="plain" href="/sample-report.html">or open the sample report</a>
</div>
</body>
