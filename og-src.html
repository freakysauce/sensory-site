<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sentys og:image source — screenshot at 1200×630</title>
<style>
@font-face { font-family:'Clash'; src:url('assets/fonts/ClashDisplay-500.woff2') format('woff2'); font-weight:500; }
@font-face { font-family:'Clash'; src:url('assets/fonts/ClashDisplay-600.woff2') format('woff2'); font-weight:600; }
@font-face { font-family:'PlexMono'; src:url('assets/fonts/PlexMono-500.woff2') format('woff2'); font-weight:500; }
@font-face { font-family:'Supreme'; src:url('assets/fonts/Supreme-Regular.woff2') format('woff2'); font-weight:400; }
html,body { margin:0; width:1200px; height:630px; overflow:hidden; background:#0f1216; }
canvas { position:absolute; inset:0; width:1200px; height:630px; }
.scrim { position:absolute; inset:0;
  background:linear-gradient(94deg, rgba(15,18,22,.97) 0%, rgba(15,18,22,.88) 38%, rgba(15,18,22,.42) 62%, rgba(15,18,22,.05) 88%),
             linear-gradient(to bottom, rgba(15,18,22,.25), rgba(15,18,22,0) 30%, rgba(15,18,22,.55) 100%); }
.copy { position:absolute; left:72px; top:0; bottom:0; display:flex; flex-direction:column; justify-content:center; max-width:640px; }
.brand { font:600 22px/1 'Clash', sans-serif; letter-spacing:.42em; color:#ece5d6; margin-bottom:34px; }
.brand i { font-style:normal; color:#f0a43c; }
h1 { font:500 64px/1.06 'Clash', sans-serif; color:#ece5d6; margin:0 0 24px; }
h1 em { font-style:normal; color:#f0a43c; }
.sub { font:400 21px/1.5 'Supreme', sans-serif; color:#98a1aa; margin:0 0 36px; max-width:30ch; }
.sub b { color:#ece5d6; font-weight:400; }
.chips { display:flex; gap:12px; }
.chip { font:500 14px/1 'PlexMono', monospace; letter-spacing:.06em; color:#ece5d6; white-space:nowrap;
  border:1px solid #2c3440; border-radius:5px; padding:11px 14px; background:rgba(15,18,22,.6); }
.chip b { color:#f0a43c; font-weight:500; }
</style>
</head>
<body>
<canvas id="c" width="1200" height="630"></canvas>
<div class="scrim"></div>
<div class="copy">
  <div class="brand">SENTY<i>S</i></div>
  <h1>Every machine has a <em>feeling</em> of healthy.</h1>
  <p class="sub">Failure warning from the sensor data you already log — <b>no failure labels, no data-science team.</b></p>
  <div class="chips">
    <span class="chip"><b>30/30</b> flagged before failure</span>
    <span class="chip"><b>59</b> cycles median warning</span>
    <span class="chip"><b>1</b> false alarm</span>
  </div>
</div>
<script>
// single deterministic frame of the site's Chladni shader, drift heat upper-right
const gl = document.getElementById('c').getContext('webgl', {antialias:false, alpha:false});
const FS = `
precision highp float;
uniform vec2 uRes;
float chladni(vec2 p, float m, float n){
  return cos(m*3.14159*p.x)*cos(n*3.14159*p.y) - cos(n*3.14159*p.x)*cos(m*3.14159*p.y);
}
float hash(vec2 q){ return fract(sin(dot(q, vec2(127.1,311.7)))*43758.5453); }
void main(){
  vec2 uv = gl_FragCoord.xy / uRes;
  float asp = uRes.x / uRes.y;
  vec2 p = (uv - vec2(.62,.48)) * vec2(asp, 1.0) * 1.9;
  vec2 warpC = vec2(.5*asp, .3);
  float wd = length(p - warpC);
  vec2 pw = p + .16 * exp(-wd*1.5) * vec2(sin(3.8+wd*5.), cos(2.9+wd*4.));
  float c = chladni(pw, 5.0, 3.0);
  float dust = 1.0 - smoothstep(0.0, 0.15, abs(c));
  float grain = hash(gl_FragCoord.xy)*.5 + hash(gl_FragCoord.xy*1.7)*.5;
  dust *= .5 + .5*grain;
  vec3 plate = mix(vec3(.052,.06,.072), vec3(.078,.088,.104), uv.y);
  float heat = .75 * exp(-wd*1.25);
  vec3 dustCol = vec3(.93,.90,.84);
  dustCol = mix(dustCol, vec3(.99,.63,.28), clamp(heat*1.7,0.,1.));
  dustCol = mix(dustCol, vec3(1.,.44,.26), clamp(heat*heat*1.9,0.,1.));
  vec3 col = plate + dust * dustCol * (.6 + .42*heat);
  float vig = smoothstep(1.7, .5, length((uv-vec2(.55,.5))*vec2(asp,1.)*1.5));
  col *= .55 + .45*vig;
  gl_FragColor = vec4(col, 1.);
}`;
const VS = 'attribute vec2 p; void main(){ gl_Position=vec4(p,0.,1.); }';
function sh(t,s){ const o=gl.createShader(t); gl.shaderSource(o,s); gl.compileShader(o); return o; }
const pr = gl.createProgram();
gl.attachShader(pr, sh(gl.VERTEX_SHADER,VS)); gl.attachShader(pr, sh(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(pr); gl.useProgram(pr);
gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
const l = gl.getAttribLocation(pr,'p');
gl.enableVertexAttribArray(l); gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0);
gl.viewport(0,0,1200,630);
gl.uniform2f(gl.getUniformLocation(pr,'uRes'),1200,630);
gl.drawArrays(gl.TRIANGLES,0,3);
</script>
</body>
</html>
